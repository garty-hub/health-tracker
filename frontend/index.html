<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>健康数据追踪助手</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="app">
    <!-- 页面容器 -->
    <div id="page-container"></div>

    <!-- 底部导航 -->
    <nav id="tab-bar" class="tab-bar">
      <div class="tab-item active" data-page="home">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">首页</span>
      </div>
      <div class="tab-item" data-page="add">
        <span class="tab-icon">➕</span>
        <span class="tab-label">添加</span>
      </div>
      <div class="tab-item" data-page="history">
        <span class="tab-icon">📋</span>
        <span class="tab-label">历史</span>
      </div>
      <div class="tab-item" data-page="analysis">
        <span class="tab-icon">📊</span>
        <span class="tab-label">分析</span>
      </div>
      <div class="tab-item" data-page="profile">
        <span class="tab-icon">👤</span>
        <span class="tab-label">我的</span>
      </div>
    </nav>
  </div>

  <!-- Toast提示 -->
  <div id="toast" class="toast"></div>

  <!-- Modal弹窗 -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">提示</span>
      </div>
      <div class="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-cancel" data-action="cancel">取消</button>
        <button class="btn btn-primary" data-action="confirm">确定</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
